<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superior Support — Performance Dashboard</title>
<link rel="icon" href="data:,">
<script src="chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ss-navy:    #0A1628;
  --ss-blue:    #0D3B6E;
  --ss-mid:     #1565C0;
  --ss-teal:    #00838F;
  --ss-lteal:   #00ACC1;
  --ss-sky:     #B3E5FC;
  --ss-gold:    #F5A623;
  --ss-silver:  #90A4AE;
  --ss-bronze:  #A1887F;
  --ss-green:   #00C853;
  --ss-amber:   #FFB300;
  --ss-red:     #E53935;
  --ss-surface: #0F1F3D;
  --ss-card:    #152744;
  --ss-border:  rgba(0,172,193,0.15);
  --ss-text:    #E8F4FD;
  --ss-muted:   #607D8B;
}
html,body{width:100%;height:100%;background:var(--ss-navy);color:var(--ss-text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;overflow:hidden}

/* ── Layout ── */
#app{width:100vw;height:100vh;display:grid;grid-template-rows:48px 1fr 46px}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:linear-gradient(90deg,var(--ss-blue) 0%,var(--ss-teal) 100%);
  border-bottom:1px solid var(--ss-border);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--ss-lteal),var(--ss-mid));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#fff;letter-spacing:-1px;
}
.logo-text{font-size:16px;font-weight:700;letter-spacing:0.5px;color:#fff}
.logo-text span{opacity:0.65;font-weight:400;margin-left:4px;font-size:13px}

/* Revenue target bar in header */
.rev-target-wrap{flex:1;max-width:420px;margin:0 32px}
.rev-target-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:4px}
.rev-target-label strong{color:#fff}
.rev-bar-track{height:8px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;position:relative}
.rev-bar-fill{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--ss-lteal),var(--ss-green));transition:width 1.5s ease}
.rev-bar-target{position:absolute;right:0;top:-2px;bottom:-2px;width:2px;background:rgba(255,255,255,0.4)}

.header-right{display:flex;align-items:center;gap:14px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;white-space:nowrap}
.badge-mtd{background:rgba(0,172,193,0.25);color:var(--ss-sky);border:1px solid rgba(0,172,193,0.4)}
.badge-month{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)}
#live-time{font-size:18px;font-weight:600;color:rgba(255,255,255,0.6);font-variant-numeric:tabular-nums;letter-spacing:1px}

/* ── Main grid ── */
#main{display:grid;grid-template-columns:1fr 1fr 200px;grid-template-rows:1fr 1fr;gap:1px;background:var(--ss-border);overflow:hidden}
.panel{background:var(--ss-surface);padding:12px 14px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.panel-full{grid-column:1/3}

.panel-title{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--ss-lteal);display:flex;align-items:center;gap:8px
}
.panel-title::after{content:'';flex:1;height:1px;background:var(--ss-border)}

/* ── Praise panel (right column, spans both rows) ── */
#praise-panel{grid-column:3;grid-row:1/3;background:var(--ss-surface);border-left:1px solid var(--ss-border);
  padding:12px 10px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.praise-card{background:var(--ss-card);border:1px solid var(--ss-border);border-radius:8px;padding:8px;flex-shrink:0}
.praise-card.featured{border-color:rgba(245,166,35,0.4);background:rgba(245,166,35,0.05)}
.praise-stars{color:var(--ss-gold);font-size:10px;letter-spacing:1px;margin-bottom:3px}
.praise-text{font-size:10px;line-height:1.5;color:var(--ss-text);opacity:0.85;font-style:italic}
.praise-from{font-size:9px;color:var(--ss-muted);margin-top:3px}
.praise-tag{display:inline-block;font-size:8px;font-weight:700;padding:1px 6px;border-radius:10px;margin-top:3px;letter-spacing:0.5px;text-transform:uppercase}
.add-btn{margin-top:auto;background:rgba(0,131,143,0.15);border:1px solid rgba(0,172,193,0.3);
  color:var(--ss-lteal);font-size:11px;font-weight:600;padding:7px;border-radius:7px;
  cursor:pointer;text-align:center;transition:all 0.2s;font-family:inherit}
.add-btn:hover{background:rgba(0,131,143,0.3)}

/* ── Chart wrappers ── */
.chart-wrap{flex:1;position:relative;min-height:0}

/* ── Bottom ticker ── */
#bottom-bar{
  background:var(--ss-blue);border-top:1px solid var(--ss-border);
  display:flex;align-items:stretch;overflow:hidden
}
.tech-pill{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:4px 8px;border-right:1px solid var(--ss-border);
  position:relative;overflow:hidden;min-width:0;
}
.tech-pill:last-child{border-right:none}
.tp-name{font-size:10px;font-weight:700;color:var(--ss-lteal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tp-jobs{font-size:16px;font-weight:900;line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.tp-jobs span{font-size:9px;font-weight:400;color:var(--ss-muted);margin-left:2px}
.tp-bar-track{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:3px}
.tp-bar-fill{height:3px;border-radius:2px;transition:width 1.2s ease}
.tp-mom{font-size:9px;margin-top:2px;font-weight:600}
.tp-mom.up{color:var(--ss-green)}.tp-mom.down{color:var(--ss-red)}.tp-mom.flat{color:var(--ss-muted)}
.crown{position:absolute;top:3px;right:4px;font-size:10px}

/* ── Modal ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
#modal.open{display:flex}
.modal-box{background:var(--ss-card);border:1px solid var(--ss-border);border-radius:14px;padding:22px;width:400px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:14px;color:var(--ss-lteal)}
.modal-box label{display:block;font-size:10px;color:var(--ss-muted);margin-bottom:3px;margin-top:10px;text-transform:uppercase;letter-spacing:0.5px}
.modal-box input,.modal-box select,.modal-box textarea{
  width:100%;background:var(--ss-surface);border:1px solid var(--ss-border);border-radius:7px;
  color:var(--ss-text);font-family:inherit;font-size:13px;padding:8px 11px}
.modal-box textarea{height:72px;resize:none}
.star-row{display:flex;gap:4px;margin:5px 0}
.star-btn{background:none;border:none;font-size:20px;cursor:pointer;opacity:0.25;transition:opacity 0.1s;color:var(--ss-gold)}
.star-btn.on{opacity:1}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{flex:1;background:var(--ss-teal);border:none;color:#fff;font-family:inherit;font-weight:600;font-size:13px;padding:9px;border-radius:7px;cursor:pointer}
.btn-cancel{background:none;border:1px solid var(--ss-border);color:var(--ss-muted);font-family:inherit;font-size:13px;padding:9px 14px;border-radius:7px;cursor:pointer}

@keyframes pulse-teal{0%,100%{box-shadow:0 0 0 0 rgba(0,172,193,0)}50%{box-shadow:0 0 16px 3px rgba(0,172,193,0.2)}}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">
    <div class="logo-mark">SS</div>
    <div class="logo-text">Superior Support <span>Performance Centre</span></div>
  </div>

  <div class="rev-target-wrap">
    <div class="rev-target-label">
      <span>Team Revenue MTD</span>
      <strong id="rev-label">Loading...</strong>
    </div>
    <div class="rev-bar-track">
      <div class="rev-bar-fill" id="rev-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="header-right">
    <span class="badge badge-mtd" id="mtd-badge">Loading...</span>
    <span class="badge badge-month" id="month-badge">—</span>
    <span id="live-time"></span>
  </div>
</header>

<div id="main">

  <!-- TOP LEFT: Utilisation -->
  <div class="panel" id="util-panel">
    <div class="panel-title">⏱ Billable Utilisation % vs 6.5h/day target</div>
    <div class="chart-wrap"><canvas id="chartUtil"></canvas></div>
  </div>

  <!-- TOP RIGHT: Jobs -->
  <div class="panel" id="jobs-panel">
    <div class="panel-title">🔧 Jobs Completed — MTD</div>
    <div class="chart-wrap"><canvas id="chartJobs"></canvas></div>
  </div>

  <!-- BOTTOM LEFT+CENTRE: Revenue -->
  <div class="panel panel-full" id="rev-panel">
    <div class="panel-title">💰 Revenue Generated MTD vs Team Target</div>
    <div class="chart-wrap"><canvas id="chartRev"></canvas></div>
  </div>

  <!-- RIGHT: Praise (spans both rows) -->
  <div id="praise-panel">
    <div class="panel-title" style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ss-lteal)">⭐ SS Recognition</div>
    <div id="praise-feed" style="display:flex;flex-direction:column;gap:6px;overflow:hidden;flex:1"></div>
    <button class="add-btn" onclick="openModal()">+ Add Customer Feedback</button>
  </div>

</div>

<!-- BOTTOM: Tech pills -->
<div id="bottom-bar" role="list" aria-label="Technician summary"></div>

</div>

<!-- MODAL -->
<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-title">Add Customer Feedback</div>
    <label>Technician</label>
    <select id="m-tech"></select>
    <label>Customer Name</label>
    <input id="m-cust" type="text" placeholder="Company / Contact name">
    <label>Rating</label>
    <div class="star-row">
      <button class="star-btn on" onclick="setStar(1)">★</button>
      <button class="star-btn on" onclick="setStar(2)">★</button>
      <button class="star-btn on" onclick="setStar(3)">★</button>
      <button class="star-btn on" onclick="setStar(4)">★</button>
      <button class="star-btn on" onclick="setStar(5)">★</button>
    </div>
    <label>Feedback</label>
    <textarea id="m-text" placeholder="What did the customer say?"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitPraise()">Save Feedback</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_URL = 'https://tech-dashboard-api-dmdvb9hvd9dnhqh7.southafricanorth-01.azurewebsites.net/api/dashboard-data';
const ADD_PRAISE_URL = 'https://tech-dashboard-api-dmdvb9hvd9dnhqh7.southafricanorth-01.azurewebsites.net/api/add-praise';

const TECHS = ['Aristo','Ashley','Bryon','Chris','David','Jarryd','Mondre','Naeem','Raees','Richard','Riedhor'];
const INITIALS = {Aristo:'AR',Ashley:'AS',Bryon:'BR',Chris:'CH',David:'DA',Jarryd:'JA',Mondre:'MO',Naeem:'NA',Raees:'RA',Richard:'RI',Riedhor:'RH'};
const COLORS = ['#4F46E5','#0891B2','#059669','#D97706','#DC2626','#7C3AED','#00838F','#2563EB','#16A34A','#9333EA','#00ACC1'];
const COLOR = t => COLORS[TECHS.indexOf(t)];

// Fallback data
let DATA = {
  month:'Apr 2026', prevMonth:'Mar 2026',
  workDaysMonth:20, workDaysDone:14, dailyTarget:6.5, targetHrsMTD:91,
  revenueTarget:300000, totalRevenue:0,
  techs:{
    Aristo: {appt:5,inv:2,jobs:5,cost:1035,travel:0.3,billPct:5},
    Ashley: {appt:93.26,inv:73.15,jobs:79,cost:32767.5,travel:97.45,billPct:102},
    Bryon:  {appt:4.15,inv:5.5,jobs:8,cost:2930,travel:0,billPct:5},
    Chris:  {appt:1.45,inv:2.5,jobs:3,cost:322.5,travel:1,billPct:2},
    David:  {appt:92.37,inv:61,jobs:68,cost:29600,travel:368.18,billPct:102},
    Jarryd: {appt:61.57,inv:35,jobs:50,cost:12357,travel:33,billPct:68},
    Mondre: {appt:82.45,inv:64,jobs:152,cost:28617,travel:2,billPct:91},
    Naeem:  {appt:105.43,inv:93.3,jobs:64,cost:39482.5,travel:36.2,billPct:116},
    Raees:  {appt:100.25,inv:59.5,jobs:115,cost:21990,travel:1.1,billPct:110},
    Richard:{appt:0,inv:1,jobs:0,cost:0,travel:0,billPct:0},
    Riedhor:{appt:103.55,inv:90.25,jobs:130,cost:40860.3,travel:20.25,billPct:114},
  },
  prevTechs:null,
  praise:[
    {tech:'Naeem',customer:'Blue Label Telecoms',stars:5,text:'Naeem resolved our server issue in record time. Absolutely professional.',date:'14 Apr'},
    {tech:'Riedhor',customer:'Grapevine Trading',stars:5,text:'Riedhor went above and beyond to get our systems back online over the weekend.',date:'11 Apr'},
    {tech:'Ashley',customer:'Cape Timber Co.',stars:5,text:'Extremely efficient. Had our network sorted within the hour.',date:'9 Apr'},
    {tech:'Raees',customer:'ACSA Logistics',stars:4,text:'Great service. On-site quickly and fixed the issue on first visit.',date:'7 Apr'},
  ]
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmtR   = v => 'R\u202F' + Math.round(v).toLocaleString('en-ZA');
const sorted = key => [...TECHS].sort((a,b) => (DATA.techs[b][key]||0)-(DATA.techs[a][key]||0));
const maxVal = key => Math.max(...TECHS.map(t => DATA.techs[t][key]||0)) || 1;

// ── CHARTS ────────────────────────────────────────────────────────────────────
const TIP  = {backgroundColor:'#0F1F3D',titleColor:'#E8F4FD',bodyColor:'#607D8B',borderColor:'rgba(0,172,193,0.3)',borderWidth:1,padding:10};
const GRID = {color:'rgba(0,172,193,0.07)'};
const XTICK = {color:'#607D8B',font:{size:11,weight:'600'}};
const YTICK = {color:'#607D8B',font:{size:10}};

let chartUtil, chartJobs, chartRev;

function buildCharts() {
  const utilSorted = sorted('billPct');
  const jobsSorted = sorted('jobs');

  // ── Utilisation chart ──
  if (chartUtil) chartUtil.destroy();
  chartUtil = new Chart(document.getElementById('chartUtil'), {
    type: 'bar',
    data: {
      labels: utilSorted,
      datasets: [
        {
          label: DATA.prevMonth || 'Prev Month',
          data: utilSorted.map(t => DATA.prevTechs ? (DATA.prevTechs[t] ? DATA.prevTechs[t].billPct : 0) : 0),
          backgroundColor: 'rgba(0,131,143,0.25)',
          borderRadius: 3, borderSkipped: false,
        },
        {
          label: DATA.month,
          data: utilSorted.map(t => DATA.techs[t].billPct),
          backgroundColor: utilSorted.map(t => {
            const p = DATA.techs[t].billPct;
            return p>=100?'#00C853':p>=80?'#F5A623':p>=60?'#FFB300':'#E53935';
          }),
          borderRadius: 4, borderSkipped: false,
        }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#607D8B',font:{size:10},boxWidth:10,padding:8}},
        tooltip:{...TIP,callbacks:{label:ctx=>` ${ctx.raw}% billable`}}
      },
      scales:{
        x:{ticks:XTICK,grid:GRID},
        y:{ticks:{...YTICK,callback:v=>v+'%'},grid:GRID,max:130,
           title:{display:true,text:'% of 6.5h/day target',color:'#607D8B',font:{size:10}}}
      }
    },
    plugins:[{
      id:'targetLine',
      afterDraw(chart){
        const {ctx,chartArea:{left,right},scales:{y}} = chart;
        const yp = y.getPixelForValue(100);
        ctx.save();
        ctx.strokeStyle='rgba(0,172,193,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
        ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='rgba(0,172,193,0.7)';ctx.font='600 10px sans-serif';
        ctx.fillText('TARGET 100%',right-78,yp-4);
        ctx.restore();
      }
    }]
  });

  // ── Jobs chart ──
  if (chartJobs) chartJobs.destroy();
  chartJobs = new Chart(document.getElementById('chartJobs'), {
    type: 'bar',
    data: {
      labels: jobsSorted,
      datasets: [
        {
          label: DATA.prevMonth || 'Prev Month',
          data: jobsSorted.map(t => DATA.prevTechs ? (DATA.prevTechs[t] ? DATA.prevTechs[t].jobs : 0) : 0),
          backgroundColor: 'rgba(0,131,143,0.25)',
          borderRadius: 3, borderSkipped: false,
        },
        {
          label: DATA.month,
          data: jobsSorted.map(t => DATA.techs[t].jobs),
          backgroundColor: jobsSorted.map(t => COLORS[TECHS.indexOf(t)]),
          borderRadius: 4, borderSkipped: false,
        }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#607D8B',font:{size:10},boxWidth:10,padding:8}},
        tooltip:{...TIP,callbacks:{label:ctx=>` ${ctx.raw} jobs`}}
      },
      scales:{
        x:{ticks:XTICK,grid:GRID},
        y:{ticks:YTICK,grid:GRID,title:{display:true,text:'Jobs completed',color:'#607D8B',font:{size:10}}}
      }
    }
  });

  // ── Revenue chart ──
  const revTarget = DATA.revenueTarget || 1;
  if (chartRev) chartRev.destroy();
  chartRev = new Chart(document.getElementById('chartRev'), {
    type: 'bar',
    data: {
      labels: TECHS,
      datasets: [
        {
          label: DATA.prevMonth || 'Prev Month',
          data: TECHS.map(t => DATA.prevTechs ? (DATA.prevTechs[t] ? DATA.prevTechs[t].cost : 0) : 0),
          backgroundColor: 'rgba(0,131,143,0.25)',
          borderRadius: 3, borderSkipped: false,
        },
        {
          label: DATA.month + ' MTD',
          data: TECHS.map(t => DATA.techs[t].cost),
          backgroundColor: COLORS,
          borderRadius: 4, borderSkipped: false,
        }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#607D8B',font:{size:10},boxWidth:10,padding:8}},
        tooltip:{...TIP,callbacks:{label:ctx=>` ${fmtR(ctx.raw)}`}}
      },
      scales:{
        x:{ticks:XTICK,grid:GRID},
        y:{ticks:{...YTICK,callback:v=>'R'+Math.round(v/1000)+'k'},grid:GRID,
           title:{display:true,text:'Revenue (R)',color:'#607D8B',font:{size:10}}}
      }
    },
    plugins:[{
      id:'revTargetLine',
      afterDraw(chart){
        if (!DATA.revenueTarget) return;
        // Draw individual share line = target / active techs
        const activeTechs = TECHS.filter(t => DATA.techs[t].cost > 0).length || 1;
        const share = DATA.revenueTarget / activeTechs;
        const {ctx,chartArea:{left,right},scales:{y}} = chart;
        const yp = y.getPixelForValue(share);
        if (yp < chart.chartArea.top || yp > chart.chartArea.bottom) return;
        ctx.save();
        ctx.strokeStyle='rgba(245,166,35,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
        ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='rgba(245,166,35,0.8)';ctx.font='600 10px sans-serif';
        ctx.fillText('SHARE: '+fmtR(share),right-100,yp-4);
        ctx.restore();
      }
    }]
  });
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function updateHeader() {
  const total  = TECHS.reduce((s,t) => s + (DATA.techs[t].cost||0), 0);
  const target = DATA.revenueTarget || 1;
  const pct    = Math.min(total/target*100, 100);

  document.getElementById('rev-bar').style.width = pct.toFixed(1) + '%';
  document.getElementById('rev-label').textContent =
    fmtR(total) + ' / ' + fmtR(target) + ' (' + Math.round(pct) + '%)';
  document.getElementById('mtd-badge').textContent =
    'MTD Day ' + DATA.workDaysDone + ' of ' + DATA.workDaysMonth + ' · Target ' + DATA.targetHrsMTD + 'h/tech';
  document.getElementById('month-badge').textContent = DATA.month;
}

// ── BOTTOM PILLS ──────────────────────────────────────────────────────────────
function buildPills() {
  const bar = document.getElementById('bottom-bar');
  bar.innerHTML = '';

  const jobTop  = sorted('jobs')[0];
  const utilTop = sorted('billPct')[0];
  const revTop  = sorted('cost')[0];
  const maxJ    = maxVal('jobs');

  TECHS.forEach(tech => {
    const d    = DATA.techs[tech];
    const c    = COLOR(tech);
    const pct  = d.billPct;
    const barC = pct>=100?'var(--ss-green)':pct>=80?'var(--ss-gold)':pct>=60?'var(--ss-amber)':'var(--ss-red)';

    // MoM indicator
    let momHtml = '';
    if (DATA.prevTechs && DATA.prevTechs[tech]) {
      const diff = d.billPct - DATA.prevTechs[tech].billPct;
      if (diff > 2)       momHtml = `<div class="tp-mom up">▲ ${diff}% vs ${DATA.prevMonth||'prev'}</div>`;
      else if (diff < -2) momHtml = `<div class="tp-mom down">▼ ${Math.abs(diff)}% vs ${DATA.prevMonth||'prev'}</div>`;
      else                momHtml = `<div class="tp-mom flat">→ steady</div>`;
    }

    const crowns = [jobTop===tech?'🏆':'', utilTop===tech?'⏱':'', revTop===tech?'💰':''].filter(Boolean).join('');

    bar.insertAdjacentHTML('beforeend', `
      <div class="tech-pill" role="listitem">
        ${crowns ? `<div class="crown">${crowns}</div>` : ''}
        <div class="tp-name" style="color:${c}">${INITIALS[tech]} · ${tech}</div>
        <div class="tp-jobs">${d.jobs}<span>jobs</span></div>
        <div class="tp-bar-track"><div class="tp-bar-fill" style="width:${Math.min(pct,100)}%;background:${barC}"></div></div>
        ${momHtml}
      </div>`);
  });
}

// ── PRAISE ────────────────────────────────────────────────────────────────────
function renderPraise() {
  const feed = document.getElementById('praise-feed');
  feed.innerHTML = '';
  (DATA.praise || []).slice(0,5).forEach((p,i) => {
    const c = COLOR(p.tech);
    const stars = '★'.repeat(p.stars)+'☆'.repeat(5-p.stars);
    feed.insertAdjacentHTML('beforeend',`
      <div class="praise-card ${i===0?'featured':''}">
        <div class="praise-stars">${stars}</div>
        <div class="praise-text">"${p.text}"</div>
        <div class="praise-from">${p.customer} · ${p.date}</div>
        <span class="praise-tag" style="background:${c}22;color:${c}">${p.tech}</span>
      </div>`);
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
let starVal = 5;
function openModal() {
  const sel = document.getElementById('m-tech');
  if (!sel.options.length) TECHS.forEach(t => sel.insertAdjacentHTML('beforeend',`<option>${t}</option>`));
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function setStar(n) {
  starVal = n;
  document.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('on', i<n));
}
async function submitPraise() {
  const tech = document.getElementById('m-tech').value;
  const cust = document.getElementById('m-cust').value.trim() || 'Anonymous';
  const text = document.getElementById('m-text').value.trim();
  if (!text) return;
  try {
    await fetch(ADD_PRAISE_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({tech, customer:cust, stars:starVal, text})
    });
  } catch(e) {
    console.warn('Praise save failed:', e.message);
  }
  // Add locally immediately so it shows on screen
  DATA.praise.unshift({tech, customer:cust, stars:starVal, text, date:'Today'});
  closeModal();
  renderPraise();
  document.getElementById('m-cust').value = '';
  document.getElementById('m-text').value = '';
  setStar(5);
}

// ── LIVE DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch(API_URL);
    if (!res.ok) throw new Error('API ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA = json;
    console.log('Data loaded:', json.month, '| Generated:', json.generatedAt);
  } catch(e) {
    console.warn('Live data load failed, using cached data:', e.message);
  }
  updateHeader();
  buildCharts();
  buildPills();
  renderPraise();
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function tick() {
  document.getElementById('live-time').textContent =
    new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick, 1000); tick();

// Load immediately, then every 15 minutes
loadData();
setInterval(loadData, 15 * 60 * 1000);
</script>
</body>
</html>
